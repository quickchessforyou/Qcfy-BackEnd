<svg width="160" height="40" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
  <!-- Frame 1: Standing/Start -->
  <g id="frame1">
    <!-- Body (Chess Pawn shape) -->
    <ellipse cx="10" cy="8" rx="6" ry="4" fill="currentColor"/>
    <rect x="7" y="10" width="6" height="8" rx="1" fill="currentColor"/>
    <circle cx="10" cy="5" r="3" fill="currentColor"/>
    
    <!-- Legs -->
    <rect x="7" y="18" width="2.5" height="8" rx="1" fill="currentColor"/>
    <rect x="10.5" y="18" width="2.5" height="8" rx="1" fill="currentColor"/>
    
    <!-- Arms -->
    <rect x="4" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8"/>
    <rect x="14" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8"/>
  </g>
  
  <!-- Frame 2: Running - Left leg forward -->
  <g id="frame2" transform="translate(40, 0)">
    <ellipse cx="10" cy="8" rx="6" ry="4" fill="currentColor"/>
    <rect x="7" y="10" width="6" height="8" rx="1" fill="currentColor"/>
    <circle cx="10" cy="5" r="3" fill="currentColor"/>
    
    <!-- Left leg forward -->
    <rect x="7" y="18" width="2.5" height="8" rx="1" fill="currentColor" transform="rotate(-20 8.25 18)"/>
    <!-- Right leg back -->
    <rect x="10.5" y="18" width="2.5" height="8" rx="1" fill="currentColor" transform="rotate(25 11.75 18)"/>
    
    <!-- Arms swinging -->
    <rect x="4" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8" transform="rotate(20 5 12)"/>
    <rect x="14" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8" transform="rotate(-20 15 12)"/>
  </g>
  
  <!-- Frame 3: Running - Mid stride -->
  <g id="frame3" transform="translate(80, 0)">
    <ellipse cx="10" cy="8" rx="6" ry="4" fill="currentColor"/>
    <rect x="7" y="10" width="6" height="8" rx="1" fill="currentColor"/>
    <circle cx="10" cy="5" r="3" fill="currentColor"/>
    
    <!-- Both legs down -->
    <rect x="7" y="18" width="2.5" height="8" rx="1" fill="currentColor"/>
    <rect x="10.5" y="18" width="2.5" height="8" rx="1" fill="currentColor"/>
    
    <!-- Arms neutral -->
    <rect x="4" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8"/>
    <rect x="14" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8"/>
  </g>
  
  <!-- Frame 4: Running - Right leg forward -->
  <g id="frame4" transform="translate(120, 0)">
    <ellipse cx="10" cy="8" rx="6" ry="4" fill="currentColor"/>
    <rect x="7" y="10" width="6" height="8" rx="1" fill="currentColor"/>
    <circle cx="10" cy="5" r="3" fill="currentColor"/>
    
    <!-- Right leg forward -->
    <rect x="10.5" y="18" width="2.5" height="8" rx="1" fill="currentColor" transform="rotate(-20 11.75 18)"/>
    <!-- Left leg back -->
    <rect x="7" y="18" width="2.5" height="8" rx="1" fill="currentColor" transform="rotate(25 8.25 18)"/>
    
    <!-- Arms swinging opposite -->
    <rect x="4" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8" transform="rotate(-20 5 12)"/>
    <rect x="14" y="12" width="2" height="6" rx="1" fill="currentColor" opacity="0.8" transform="rotate(20 15 12)"/>
  </g>
</svg>
